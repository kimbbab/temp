<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 식당 룰렛</title>
    <style>
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            font-family: 'Malgun Gothic', sans-serif; 
            background-color: #f8f9fa; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }
        h2 { color: #333; margin-bottom: 20px; }
        
        #roulette-container { 
            position: relative; 
            width: 320px; 
            height: 320px; 
            margin-bottom: 25px; 
        }
        canvas { 
            border-radius: 50%; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); 
            background-color: white;
            transform: rotate(-90deg); /* 12시 방향 기준점 맞춤 */
        }
        .pointer { 
            position: absolute; 
            top: -15px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 0; 
            height: 0; 
            border-left: 15px solid transparent; 
            border-right: 15px solid transparent; 
            border-top: 30px solid #ff4757; 
            z-index: 10; 
        }
        
        button { 
            padding: 12px 40px; 
            font-size: 20px; 
            font-weight: bold; 
            background-color: #2ed573; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: all 0.2s ease-in-out; 
            margin-bottom: 20px;
        }
        button:hover { 
            background-color: #27ae60; 
            transform: translateY(-2px);
        }
        button:disabled { 
            background-color: #ced4da; 
            cursor: not-allowed; 
            transform: none;
        }
        
        #result-text { 
            font-size: 24px; 
            font-weight: bold; 
            color: #ff4757; 
            height: 35px; 
        }

        /* 결과 카드 스타일 (새로 추가됨) */
        #result-card {
            display: none; /* 처음엔 숨김 */
            margin-top: 15px;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 320px;
            border: 2px solid #ff4757;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }
        #result-desc { 
            font-size: 16px; 
            color: #555; 
            line-height: 1.5; 
            word-break: keep-all;
        }
        .map-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #03c75a; /* 네이버 그린 */
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .map-btn:hover { background-color: #02a348; }
    </style>
</head>
<body>

    <h2>오늘은 어디로 갈까요? 🤔</h2>
    <div id="roulette-container">
        <div class="pointer"></div>
        <canvas id="wheel" width="320" height="320"></canvas>
    </div>
    
    <button id="spinBtn">돌리기!</button>
    <div id="result-text"></div>

    <div id="result-card">
        <p id="result-desc"></p>
        <a id="map-link" class="map-btn" href="#" target="_blank">네이버 지도에서 보기</a>
    </div>

    <script>
        const canvas = document.getElementById("wheel");
        const ctx = canvas.getContext("2d");
        const spinBtn = document.getElementById("spinBtn");
        const resultText = document.getElementById("result-text");
        const resultCard = document.getElementById("result-card");
        const resultDesc = document.getElementById("result-desc");
        const mapLink = document.getElementById("map-link");

        // 식당 목록과 칸별 색상
        const items = ["장군집", "대송참숯", "마포옥", "맛찬들", "유일순대"];
        const colors = ["#ffb8b8", "#ffcccc", "#f8efba", "#c8d6e5", "#cf6a87"];
        
        // 식당별 추가 데이터 (설명 및 지도 검색 링크)
        const restaurantData = {
            "장군집": { 
                desc: "가성비 최고! 연탄불에 구워먹는 쫄깃한 돼지 부속고기와 시원한 소주 한 잔 🍶", 
                link: "https://map.naver.com/p/search/광명%20장군집" 
            },
            "대송참숯": { 
                desc: "입에서 살살 녹는 투뿔 한우! 프라이빗하고 고급스러운 분위기에서 제대로 된 식사를 ✨", 
                link: "https://map.naver.com/p/search/대송참숯" 
            },
            "마포옥": { 
                desc: "미쉐린 가이드 선정! 맑고 깊은 국물의 한우 양지 설렁탕으로 몸보신 제대로 🥣", 
                link: "https://map.naver.com/p/search/마포옥" 
            },
            "맛찬들": { 
                desc: "전문가가 구워주는 겉바속촉 끝판왕! 두툼한 숙성 돼지고기의 진수를 맛보세요 🥩", 
                link: "https://map.naver.com/p/search/철산%20맛찬들" 
            },
            "유일순대": { 
                desc: "은은한 인삼 향이 매력적인, 늘 웨이팅이 끊이지 않는 지역 찐 순대국 맛집 🥘", 
                link: "https://map.naver.com/p/search/광명%20유일순대" 
            }
        };

        let currentAngle = 0;
        let isSpinning = false;
        let spinTimeout = null;
        
        const arc = Math.PI * 2 / items.length;

        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < items.length; i++) {
                const angle = currentAngle + i * arc;
                
                ctx.beginPath();
                ctx.fillStyle = colors[i];
                ctx.moveTo(canvas.width / 2, canvas.height / 2);
                ctx.arc(canvas.width / 2, canvas.height / 2, canvas.width / 2, angle, angle + arc, false);
                ctx.fill();
                ctx.save();
                
                ctx.fillStyle = "#2f3542";
                ctx.font = "bold 20px 'Malgun Gothic'";
                ctx.translate(canvas.width / 2 + Math.cos(angle + arc / 2) * 100, 
                              canvas.height / 2 + Math.sin(angle + arc / 2) * 100);
                ctx.rotate(angle + arc / 2 + Math.PI / 2);
                ctx.fillText(items[i], -ctx.measureText(items[i]).width / 2, 0);
                ctx.restore();
            }
        }

        function spin() {
            if (isSpinning) return;
            isSpinning = true;
            spinBtn.disabled = true;
            resultText.innerText = "두구두구두구... 🥁";
            
            // 돌아갈 때 이전 결과 카드 숨기기
            resultCard.style.opacity = 0;
            setTimeout(() => { resultCard.style.display = "none"; }, 300);

            const spinAngleStart = Math.random() * 10 + 20; 
            let spinTime = 0;
            const spinTimeTotal = Math.random() * 3000 + 4000;

            function rotateWheel() {
                spinTime += 30;
                if (spinTime >= spinTimeTotal) {
                    stopRotateWheel();
                    return;
                }
                const spinAngle = spinAngleStart - easeOut(spinTime, 0, spinAngleStart, spinTimeTotal);
                currentAngle += (spinAngle * Math.PI / 180);
                drawWheel();
                spinTimeout = requestAnimationFrame(rotateWheel);
            }
            rotateWheel();
        }

        function stopRotateWheel() {
            cancelAnimationFrame(spinTimeout);
            
            // 당첨 항목 계산 (캔버스를 CSS로 -90도 돌려놓았으므로 계산식 조정)
            const degrees = currentAngle * 180 / Math.PI;
            const arcd = arc * 180 / Math.PI;
            const index = Math.floor((360 - degrees % 360) / arcd) % items.length;
            
            const selectedItem = items[index];
            resultText.innerHTML = "🎉 <b>" + selectedItem + "</b> 당첨! 🎉";
            
            // 결과 카드 정보 업데이트 및 표시
            resultDesc.innerText = restaurantData[selectedItem].desc;
            mapLink.href = restaurantData[selectedItem].link;
            
            resultCard.style.display = "block";
            // 약간의 딜레이 후 페이드인 애니메이션
            setTimeout(() => { resultCard.style.opacity = 1; }, 50);

            isSpinning = false;
            spinBtn.disabled = false;
        }

        function easeOut(t, b, c, d) {
            const ts = (t /= d) * t;
            const tc = ts * t;
            return b + c * (tc + -3 * ts + 3 * t);
        }

        drawWheel();
        spinBtn.addEventListener("click", spin);
    </script>
</body>
</html>
